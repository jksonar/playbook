---
- hosts: all
  become: yes
  remote_user: root
  tasks:
    - name: "Install multi python packages with version specifiers"
      ansible.builtin.pip:
        name:
          - django>1.11.0,<1.12.0
          - bottle>0.10,<0.20,!=0.11

    - name: "Install bottle python package"
      ansible.builtin.pip:
        name: bottle